<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="XnZdfKdgVp_0WJkxY2NoJl47MPyzJPJmqyrLa_dPqBY" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://zylora.com/" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Primary Meta Tags -->
    <title>ZyLora - Premium Agri E-Commerce</title>
    <meta name="title" content="ZyLora - Premium Agri E-Commerce" />
    <meta name="description" content="ZyLora is a premium e-commerce platform for agricultural products, featuring real-time auctions, price negotiations, and high-quality farm supplies." />
    <meta name="keywords" content="agriculture, e-commerce, agri-tech, auctions, farm supplies, negotiation, ZyLora" />
    <meta name="author" content="ZyLora Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zylora.com/" />
    <meta property="og:title" content="ZyLora - Premium Agri E-Commerce" />
    <meta property="og:description" content="Experience the future of agriculture commerce with real-time auctions and negotiations." />
    <meta property="og:image" content="/promo-banner.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zylora.com/" />
    <meta property="twitter:title" content="ZyLora - Premium Agri E-Commerce" />
    <meta property="twitter:description" content="Experience the future of agriculture commerce with real-time auctions and negotiations." />
    <meta property="twitter:image" content="/promo-banner.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ZyLora",
      "url": "https://zylora.com/",
      "logo": "https://zylora.com/favicon.png",
      "description": "Premium e-commerce platform for agricultural products and real-time auctions.",
      "sameAs": [
        "https://twitter.com/zylora",
        "https://facebook.com/zylora"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://zylora.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://zylora.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
